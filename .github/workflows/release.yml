name: Publish signed APK

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Test and build unsigned APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_code: ${{ steps.version.outputs.version_code }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Check out reviewed source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Java 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Install required Android SDK packages
        shell: bash
        run: sdkmanager "platforms;android-36" "build-tools;35.0.1"

      - name: Validate source and release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --no-tags
          main_sha="$(git rev-parse origin/main)"
          if [ "$GITHUB_SHA" != "$main_sha" ]; then
            echo "Releases must be built from the exact current main commit ($main_sha)" >&2
            exit 1
          fi

          version="$(sed -n 's/^[[:space:]]*versionName = "\([^"]*\)"/\1/p' app/build.gradle.kts | head -n 1)"
          version_code="$(sed -n 's/^[[:space:]]*versionCode = \([0-9][0-9]*\)/\1/p' app/build.gradle.kts | head -n 1)"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "versionName must contain exactly three numeric components" >&2
            exit 1
          fi
          if [[ ! "$version_code" =~ ^[1-9][0-9]*$ ]]; then
            echo "versionCode must be a positive integer" >&2
            exit 1
          fi

          tag="v$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Run tests, lint, and unsigned release build
        shell: bash
        run: ./gradlew --no-daemon testDebugUnitTest lintRelease assembleRelease -PallowUnsignedRelease=true

      - name: Upload unsigned APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unsigned-release-${{ github.sha }}
          path: app/build/outputs/apk/release/anilili-plus.apk
          if-no-files-found: error
          retention-days: 1

  sign:
    name: Sign and verify APK
    needs: build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read

    steps:
      - name: Download unsigned APK
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: unsigned-release-${{ github.sha }}
          path: unsigned

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Install Android build tools
        shell: bash
        run: sdkmanager "build-tools;35.0.1"

      - name: Sign with the protected release identity
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for value in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD
          do
            if [ -z "${!value:-}" ]; then
              echo "Missing protected release secret: $value" >&2
              exit 1
            fi
          done

          keystore="$RUNNER_TEMP/anilili-plus-release.jks"
          trap 'rm -f "$keystore"' EXIT
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore"
          mkdir -p dist
          apk="dist/anilili-plus-v${{ needs.build.outputs.version }}.apk"
          "$ANDROID_HOME/build-tools/35.0.1/zipalign" \
            -P 16 -f 4 \
            unsigned/anilili-plus.apk \
            "$RUNNER_TEMP/anilili-plus-aligned.apk"
          "$ANDROID_HOME/build-tools/35.0.1/apksigner" sign \
            --ks "$keystore" \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass env:ANDROID_KEYSTORE_PASSWORD \
            --key-pass env:ANDROID_KEY_PASSWORD \
            --out "$apk" \
            "$RUNNER_TEMP/anilili-plus-aligned.apk"

      - name: Verify package, version, signer, and monotonic version code
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_SIGNING_CERT_SHA256: 8e6074abb7c1ff62ffd288ac273690fcaa0423ef6fd4098ca4246bb6b80b4044
        run: |
          set -euo pipefail
          version="${{ needs.build.outputs.version }}"
          version_code="${{ needs.build.outputs.version_code }}"
          apk_name="anilili-plus-v${version}.apk"
          checksum_name="${apk_name}.sha256"
          apk="dist/$apk_name"

          badging="$("$ANDROID_HOME/build-tools/35.0.1/aapt" dump badging "$apk" | head -n 1)"
          grep -Fq "package: name='com.nassimarifette.anililiplus'" <<< "$badging"
          grep -Fq "versionCode='$version_code'" <<< "$badging"
          grep -Fq "versionName='$version'" <<< "$badging"
          "$ANDROID_HOME/build-tools/35.0.1/zipalign" -c -P 16 -v 4 "$apk"

          signature="$("$ANDROID_HOME/build-tools/35.0.1/apksigner" verify --verbose --print-certs "$apk")"
          printf '%s\n' "$signature"
          grep -Fq "Number of signers: 1" <<< "$signature"
          actual_cert="$(sed -n 's/^Signer #1 certificate SHA-256 digest: //p' <<< "$signature" | head -n 1 | tr '[:upper:]' '[:lower:]' | tr -d ':[:space:]')"
          if [ "$actual_cert" != "$EXPECTED_SIGNING_CERT_SHA256" ]; then
            echo "Release APK signing certificate does not match the pinned identity" >&2
            exit 1
          fi

          latest_path="$RUNNER_TEMP/latest-release.json"
          latest_status="$(curl --silent --show-error --location \
            --output "$latest_path" \
            --write-out '%{http_code}' \
            --header 'Accept: application/vnd.github+json' \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/latest")"
          if [ "$latest_status" = "200" ]; then
            latest="$(cat "$latest_path")"
            mapfile -t previous_urls < <(
              jq -r '.assets[] | select(.state == "uploaded") | select((.name | startswith("anilili-plus-v")) and (.name | endswith(".apk"))) | .browser_download_url' <<< "$latest"
            )
            if [ "${#previous_urls[@]}" -ne 1 ]; then
              echo "Previous latest release does not contain exactly one AniLili+ APK" >&2
              exit 1
            fi
            curl --fail --location --silent --show-error \
              --output "$RUNNER_TEMP/previous.apk" "${previous_urls[0]}"
            previous_badging="$("$ANDROID_HOME/build-tools/35.0.1/aapt" dump badging "$RUNNER_TEMP/previous.apk" | head -n 1)"
            grep -Fq "package: name='com.nassimarifette.anililiplus'" <<< "$previous_badging"
            previous_code="$(sed -n "s/.*versionCode='\([0-9][0-9]*\)'.*/\1/p" <<< "$previous_badging")"
            previous_version="$(sed -n "s/.*versionName='\([^']*\)'.*/\1/p" <<< "$previous_badging")"
            if [ -z "$previous_code" ] || [ "$version_code" -le "$previous_code" ]; then
              echo "versionCode $version_code must exceed previous release code $previous_code" >&2
              exit 1
            fi
            if [[ ! "$previous_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Previous release has an unsupported versionName: $previous_version" >&2
              exit 1
            fi
            IFS=. read -r previous_major previous_minor previous_patch <<< "$previous_version"
            IFS=. read -r current_major current_minor current_patch <<< "$version"
            if ! ((
              10#$current_major > 10#$previous_major ||
              (10#$current_major == 10#$previous_major && 10#$current_minor > 10#$previous_minor) ||
              (10#$current_major == 10#$previous_major && 10#$current_minor == 10#$previous_minor && 10#$current_patch > 10#$previous_patch)
            )); then
              echo "versionName $version must be newer than previous release $previous_version" >&2
              exit 1
            fi
            previous_signature="$("$ANDROID_HOME/build-tools/35.0.1/apksigner" verify --verbose --print-certs "$RUNNER_TEMP/previous.apk")"
            grep -Fq "Number of signers: 1" <<< "$previous_signature"
            previous_cert="$(sed -n 's/^Signer #1 certificate SHA-256 digest: //p' <<< "$previous_signature" | head -n 1 | tr '[:upper:]' '[:lower:]' | tr -d ':[:space:]')"
            if [ "$previous_cert" != "$EXPECTED_SIGNING_CERT_SHA256" ]; then
              echo "Previous release does not use the pinned signing identity" >&2
              exit 1
            fi
          elif [ "$latest_status" != "404" ]; then
            echo "GitHub latest-release lookup failed with HTTP $latest_status" >&2
            exit 1
          fi

          (cd dist && sha256sum "$apk_name" > "$checksum_name")

      - name: Upload verified signed APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: signed-release-${{ github.sha }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish verified GitHub Release
    needs:
      - build
      - sign
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download verified signed APK
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: signed-release-${{ github.sha }}
          path: dist

      - name: Verify downloaded workflow artifact
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          apk_name="anilili-plus-v${{ needs.build.outputs.version }}.apk"
          sha256sum --check "${apk_name}.sha256"

      - name: Publish a fully populated immutable GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.build.outputs.tag }}
          VERSION: ${{ needs.build.outputs.version }}
          APK_NAME: anilili-plus-v${{ needs.build.outputs.version }}.apk
          CHECKSUM_NAME: anilili-plus-v${{ needs.build.outputs.version }}.apk.sha256
        run: |
          set -euo pipefail
          api_version="2026-03-10"

          immutable_enabled="$(
            gh api \
              -H "X-GitHub-Api-Version: $api_version" \
              "repos/$GITHUB_REPOSITORY/immutable-releases" \
              --jq '.enabled' 2>/dev/null || true
          )"
          if [ "$immutable_enabled" != "true" ]; then
            echo "Repository release immutability must be enabled before publishing" >&2
            exit 1
          fi

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists and will not be replaced" >&2
            exit 1
          fi
          if gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists and will not be moved" >&2
            exit 1
          fi

          release_id=""
          published=false
          cleanup_draft() {
            status=$?
            trap - EXIT
            if [ "$status" -ne 0 ] && [ "$published" != "true" ] && [ -n "$release_id" ]; then
              gh api --method DELETE \
                -H "X-GitHub-Api-Version: $api_version" \
                "repos/$GITHUB_REPOSITORY/releases/$release_id" >/dev/null || true
            fi
            exit "$status"
          }
          trap cleanup_draft EXIT

          release_json="$(
            gh api --method POST \
              -H "X-GitHub-Api-Version: $api_version" \
              "repos/$GITHUB_REPOSITORY/releases" \
              -f tag_name="$TAG" \
              -f target_commitish="$GITHUB_SHA" \
              -f name="AniLili+ v$VERSION" \
              -F draft=true \
              -F generate_release_notes=true
          )"
          release_id="$(jq -er '.id' <<< "$release_json")"
          jq -e \
            --arg tag "$TAG" \
            --arg target "$GITHUB_SHA" \
            '.draft == true and .immutable == false and .tag_name == $tag and .target_commitish == $target' \
            <<< "$release_json" >/dev/null

          gh release upload "$TAG" \
            "dist/$APK_NAME" \
            "dist/$CHECKSUM_NAME" \
            --repo "$GITHUB_REPOSITORY"

          draft_json=""
          for attempt in $(seq 1 15); do
            draft_json="$(
              gh api \
                -H "X-GitHub-Api-Version: $api_version" \
                "repos/$GITHUB_REPOSITORY/releases/$release_id"
            )"
            if jq -e \
              --arg apk "$APK_NAME" \
              --arg checksum "$CHECKSUM_NAME" \
              '.draft == true and
               ([.assets[] | select(.state == "uploaded") | .name] | sort) == ([$apk, $checksum] | sort) and
               all(.assets[].digest; if type == "string" then startswith("sha256:") else false end)' \
              <<< "$draft_json" >/dev/null
            then
              break
            fi
            if [ "$attempt" -eq 15 ]; then
              echo "Uploaded assets did not become verifiable in time" >&2
              exit 1
            fi
            sleep 2
          done
          jq -e \
            --arg apk "$APK_NAME" \
            --arg checksum "$CHECKSUM_NAME" \
            '.draft == true and
             ([.assets[] | select(.state == "uploaded") | .name] | sort) == ([$apk, $checksum] | sort) and
             all(.assets[].digest; if type == "string" then startswith("sha256:") else false end)' \
            <<< "$draft_json" >/dev/null

          for path in "dist/$APK_NAME" "dist/$CHECKSUM_NAME"; do
            name="$(basename "$path")"
            expected="sha256:$(sha256sum "$path" | awk '{print $1}')"
            actual="$(jq -er --arg name "$name" '.assets[] | select(.name == $name) | .digest' <<< "$draft_json")"
            if [ "$actual" != "$expected" ]; then
              echo "Uploaded asset digest mismatch for $name" >&2
              exit 1
            fi
          done

          published_json="$(
            gh api --method PATCH \
              -H "X-GitHub-Api-Version: $api_version" \
              "repos/$GITHUB_REPOSITORY/releases/$release_id" \
              -F draft=false \
              -f make_latest=true
          )"
          published=true
          jq -e \
            --arg tag "$TAG" \
            --arg target "$GITHUB_SHA" \
            --arg apk "$APK_NAME" \
            --arg checksum "$CHECKSUM_NAME" \
            '.draft == false and .immutable == true and .tag_name == $tag and
             .target_commitish == $target and
             ([.assets[] | select(.state == "uploaded") | .name] | sort) == ([$apk, $checksum] | sort)' \
            <<< "$published_json" >/dev/null

          tag_target="$(
            gh api \
              -H "X-GitHub-Api-Version: $api_version" \
              "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG" \
              --jq '.object.sha'
          )"
          if [ "$tag_target" != "$GITHUB_SHA" ]; then
            echo "Published immutable tag does not point to the reviewed main commit" >&2
            exit 1
          fi
